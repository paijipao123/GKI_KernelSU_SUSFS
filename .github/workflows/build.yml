name: Build Ace5 Kernel KSU+SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出内核源码
        uses: actions/checkout@v4
        with:
          path: kernel_src

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev \
            gcc-aarch64-linux-gnu make python3 zip curl git ccache

      - name: 下载 Clang
        run: |
          mkdir -p ~/clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/19.0.0-20240318/Clang-19.0.0-20240318.tar.gz
          tar -xf Clang-*.tar.gz -C ~/clang
          echo "$HOME/clang/bin" >> $GITHUB_PATH

      - name: 写入功能配置
        working-directory: kernel_src
        run: |
          # 查找实际存在的 defconfig
          if [ -f arch/arm64/configs/vendor/kalama_gki_defconfig ]; then
            DEFCONFIG="arch/arm64/configs/vendor/kalama_gki_defconfig"
          elif [ -f arch/arm64/configs/gki_defconfig ]; then
            DEFCONFIG="arch/arm64/configs/gki_defconfig"
          else
            echo "❌ 找不到 defconfig"
            exit 1
          fi
          echo "使用 defconfig: ${DEFCONFIG}"
          
          cat >> "${DEFCONFIG}" << 'EOF'
          CONFIG_LOCALVERSION="-TvT"
          CONFIG_MODULES=y
          CONFIG_MODULE_UNLOAD=y
          CONFIG_KPROBES=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_HAVE_DYNAMIC_FTRACE=y
          CONFIG_HAVE_FENTRY=y
          CONFIG_DYNAMIC_FTRACE=y
          CONFIG_BPF_JIT=y
          CONFIG_BPF_SYSCALL=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_DEFAULT_BBR=y
          CONFIG_IP_SET=m
          CONFIG_IP_SET_HASH_IP=m
          CONFIG_IP_SET_HASH_IPPORT=m
          CONFIG_IP_SET_HASH_NET=m
          CONFIG_IP_SET_HASH_NETPORT=m
          CONFIG_IP_SET_BITMAP_IP=m
          CONFIG_IP_SET_BITMAP_PORT=m
          CONFIG_IP_SET_LIST_SET=m
          CONFIG_IP_NF_MATCH_SET=m
          CONFIG_NETFILTER_XT_SET=m
          EOF

          sed -i '/CONFIG_KSU_SUSFS/d' "${DEFCONFIG}" 2>/dev/null || true
          cat >> "${DEFCONFIG}" << 'EOF'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_ENABLE_AUTO_ADD=y
          EOF

      - name: 编译内核
        working-directory: kernel_src
        run: |
          export ARCH=arm64
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          if [ -f arch/arm64/configs/vendor/kalama_gki_defconfig ]; then
            DEFCONFIG="arch/arm64/configs/vendor/kalama_gki_defconfig"
          else
            DEFCONFIG="arch/arm64/configs/gki_defconfig"
          fi
          
          make O=out ARCH=arm64 CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            ${DEFCONFIG}
            
          make O=out ARCH=arm64 CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            -j$(nproc --all)

      - name: 打包 AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 ak3
          cp kernel_src/out/arch/arm64/boot/Image ak3/ 2>/dev/null || \
          cp kernel_src/out/arch/arm64/boot/Image.gz ak3/
          cp kernel_src/out/arch/arm64/boot/dtb.img ak3/ 2>/dev/null || true
          cp kernel_src/out/arch/arm64/boot/dtbo.img ak3/ 2>/dev/null || true
          cd ak3 && zip -r9 ../Ace5-Kernel-$(date +%Y%m%d-%H%M).zip *

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: Ace5-Kernel
          path: Ace5-Kernel-*.zip
